<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — {{ site.description }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>
<body>

  <nav>
    <a class="nav-logo" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <ul class="nav-links">
      <li><a href="{{ '/#about' | relative_url }}">About</a></li>
      <li><a href="{{ '/#projects' | relative_url }}">Projects</a></li>
      <li><a href="{{ '/#blog' | relative_url }}">Writing</a></li>
    </ul>
  </nav>

  {{ content }}

  <footer>
    <span class="footer-copy">© {{ 'now' | date: '%Y' }} {{ site.author }}</span>
    <div class="footer-links">
      <a href="mailto:{{ site.email }}">Email</a>
      <a href="{{ site.linkedin_url }}" target="_blank" rel="noopener">LinkedIn</a>
      <a href="{{ site.github_url }}" target="_blank" rel="noopener">GitHub</a>
    </div>
  </footer>

  <script>
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } }),
      { threshold: 0.1 }
    );
    reveals.forEach(el => observer.observe(el));
  </script>

</body>
</html>
