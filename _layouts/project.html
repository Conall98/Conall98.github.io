---
layout: default
---
<article class="post-wrap">
  <a class="post-back" href="{{ '/#projects' | relative_url }}">← Back to Projects</a>
  {% if page.tag %}<p class="post-date">{{ page.tag }}</p>{% endif %}
  <h1 class="post-title">{{ page.title }}</h1>
  {% if page.image %}
  <div class="post-image" style="background-image: url('{{ page.image }}');"></div>
  {% endif %}
  <div class="post-content">
    {{ content }}
  </div>
</article>
