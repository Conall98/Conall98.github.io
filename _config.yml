title: Conall de Paor
description: Writer | Aerospace Engineer
author: Conall de Paor
email: hello@conalldepaor.com
url: "https://conalldepaor.com"

# Banner image used behind the hero. Replace with your own image when ready.
hero_banner: "/assets/img/40560015.jpg"

# Social links shown in the footer
github_url: "https://github.com/Conall98"
linkedin_url: "https://linkedin.com"

# Jekyll build settings
markdown: kramdown
permalink: /:year/:month/:day/:title/

# Projects collection — drop a markdown file into _projects/ and it shows up
# as a card on the homepage with its own detail page at /projects/slug/
collections:
  projects:
    output: true
    permalink: /projects/:path/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project

# Files to exclude from the built site
exclude:
  - INSTRUCTIONS.md
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - _projects/README.md
  - assets/img/README.md
